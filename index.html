<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Tool</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<h1>Barcode Tool</h1>

<div class="container">
  <div class="editor-wrapper">
    <div class="editor-grid">

      <div class="scan-panel">
        <div class="editor-panel-header">
          <span class="editor-label">Scan Input</span>
        </div>
        <textarea id="scanInput" placeholder="Scan or paste barcodes here — each line is automatically routed to the correct editor below" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <div class="editor-panel">
        <div class="editor-panel-header">
          <div class="editor-title">
            <span class="editor-label">Serials</span>
            <span class="editor-badge" id="badgeSerials">0</span>
          </div>
          <div class="editor-actions">
            <button class="icon-btn" title="Add trailing tab" onclick="addTrailingTab('serials')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/><line x1="20" y1="5" x2="20" y2="19"/></svg></button>
            <button class="icon-btn" title="Remove trailing tab" onclick="removeTrailingTab('serials')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="5" x2="4" y2="19"/><polyline points="15 18 9 12 15 6"/></svg></button>
            <button class="icon-btn" title="Copy" onclick="copyEditor('serials')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="icon-btn" title="Clear" onclick="clearEditor('serials')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
            <button class="icon-btn" title="Load from memory" onclick="openMemoryDialog('serials')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          </div>
        </div>
        <textarea id="editorSerials" placeholder="Serials appear here…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <div class="editor-panel">
        <div class="editor-panel-header">
          <div class="editor-title">
            <span class="editor-label">Part Numbers</span>
            <span class="editor-badge" id="badgePartNumbers">0</span>
          </div>
          <div class="editor-actions">
            <button class="icon-btn" title="Copy" onclick="copyEditor('partnumbers')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="icon-btn" title="Clear" onclick="clearEditor('partnumbers')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
            <button class="icon-btn" title="Load from memory" onclick="openMemoryDialog('partnumbers')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          </div>
        </div>
        <textarea id="editorPartNumbers" placeholder="Part numbers appear here…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <div class="editor-panel">
        <div class="editor-panel-header">
          <div class="editor-title">
            <span class="editor-label">EAN Codes</span>
            <span class="editor-badge" id="badgeEAN">0</span>
          </div>
          <div class="editor-actions">
            <button class="icon-btn" title="Copy" onclick="copyEditor('eancodes')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="icon-btn" title="Clear" onclick="clearEditor('eancodes')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
            <button class="icon-btn" title="Load from memory" onclick="openMemoryDialog('eancodes')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          </div>
        </div>
        <textarea id="editorEAN" placeholder="EAN codes appear here…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <div class="editor-panel">
        <div class="editor-panel-header">
          <div class="editor-title">
            <span class="editor-label">Other</span>
            <span class="editor-badge" id="badgeOther">0</span>
          </div>
          <div class="editor-actions">
            <button class="icon-btn" title="Copy" onclick="copyEditor('other')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="icon-btn" title="Clear" onclick="clearEditor('other')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
        </div>
        <textarea id="editorOther" placeholder="Unrecognised barcodes appear here…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

    </div>
    <div class="scan-hint" id="scanHint">Click Scan Input or an editor, then scan</div>
  </div>
</div>

<div id="toast"></div>

<div id="memoryDialog" class="dialog-overlay" onclick="closeDialogOnBackdrop(event)">
  <div class="dialog">
    <div class="dialog-header">
      <h3 id="dialogTitle"></h3>
      <button class="dialog-close" onclick="closeMemoryDialog()">&#x2715;</button>
    </div>
    <div class="dialog-toolbar">
      <label class="select-all-label">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"> Select all
      </label>
      <span id="dialogCount" class="dialog-count"></span>
    </div>
    <div class="dialog-list" id="dialogList"></div>
    <div class="dialog-footer">
      <button class="btn btn-primary" onclick="addSelectedToEditor()">Add to editor</button>
      <button class="btn btn-default" onclick="closeMemoryDialog()">Cancel</button>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
